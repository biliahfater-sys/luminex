<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1233"/><stop offset="1" stop-color="#0a0719"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241b45"/><stop offset="1" stop-color="#161029"/>
    </linearGradient>
    <linearGradient id="prod" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="70"/></filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <circle cx="220" cy="140" r="220" fill="#d946ef" opacity="0.2" filter="url(#blur)"/>
  <circle cx="1010" cy="640" r="240" fill="#6366f1" opacity="0.22" filter="url(#blur)"/>
  <!-- product card -->
  <g transform="translate(330 120) rotate(-3)">
    <rect width="430" height="520" rx="28" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="36" y="36" width="358" height="280" rx="18" fill="#0d0a1d"/>
    <circle cx="215" cy="176" r="92" fill="url(#prod)"/>
    <circle cx="215" cy="176" r="92" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
    <ellipse cx="215" cy="288" rx="100" ry="14" fill="#000000" opacity="0.4"/>
    <text x="36" y="368" font-family="sans-serif" font-weight="bold" font-size="30" fill="#ffffff">Aura Sphere 01</text>
    <text x="36" y="404" font-family="monospace" font-size="22" fill="#b8b3e0">Limited · 3D preview</text>
    <rect x="36" y="436" width="200" height="52" rx="26" fill="url(#prod)"/>
    <text x="70" y="470" font-family="sans-serif" font-weight="bold" font-size="22" fill="#ffffff">Buy · $129</text>
    <rect x="296" y="436" width="98" height="52" rx="26" fill="none" stroke="#b8b3e0" stroke-opacity="0.4"/>
    <text x="320" y="470" font-family="sans-serif" font-size="20" fill="#b8b3e0">360°</text>
  </g>
  <!-- echo cards -->
  <rect x="800" y="180" width="300" height="380" rx="24" fill="url(#card)" opacity="0.6" transform="rotate(4 950 370)" stroke="#ffffff" stroke-opacity="0.06"/>
  <rect x="120" y="230" width="180" height="280" rx="20" fill="url(#card)" opacity="0.5" transform="rotate(-7 210 370)" stroke="#ffffff" stroke-opacity="0.06"/>
  <text x="84" y="690" font-family="monospace" font-size="24" fill="#b8b3e0">CART (2) · 1-CLICK CHECKOUT · +210% REV</text>
</svg>
